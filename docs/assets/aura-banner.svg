<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="AURA — Automated Urban Risk Analytics">
  <defs>
    <radialGradient id="glow" cx="50%" cy="73%" r="52%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.36"/>
      <stop offset="46%" stop-color="#9a2d0c" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#08080a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="risk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="400" fill="#08080a"/>
  <rect width="1280" height="400" fill="url(#glow)"/>

  <!-- faint map graticule -->
  <g stroke="#f59e0b" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/>
  </g>

  <!-- region badge -->
  <g transform="translate(490,54)">
    <rect x="0" y="0" width="300" height="30" rx="15" fill="#1a130a" stroke="#f59e0b" stroke-opacity="0.45"/>
    <circle cx="22" cy="15" r="4" fill="#f59e0b"/>
    <text x="40" y="20" font-family="'SF Mono','Consolas',ui-monospace,monospace" font-size="13" letter-spacing="3" fill="#fcd34d">PHOENIX  METRO  ANALYTICS</text>
  </g>

  <!-- wordmark -->
  <text x="640" y="205" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="150" font-weight="800" letter-spacing="14" fill="url(#word)">AURA</text>
  <text x="640" y="245" text-anchor="middle" font-family="'SF Mono','Consolas',ui-monospace,monospace" font-size="17" letter-spacing="7" fill="#e7d8c4">AUTOMATED URBAN RISK ANALYTICS</text>
  <text x="640" y="285" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="19" fill="#a89e90">Ask the city anything — in plain English.</text>

  <!-- floating data chips -->
  <g font-family="'Segoe UI',Arial,sans-serif" font-size="14">
    <g transform="translate(96,150)">
      <circle cx="0" cy="-4" r="4" fill="#f59e0b"/>
      <text x="14" y="0" fill="#f4f4f5" font-weight="700">847K+ records</text>
      <text x="14" y="18" fill="#8a8278" font-size="12">Phoenix metro</text>
    </g>
    <g transform="translate(150,260)">
      <circle cx="0" cy="-4" r="4" fill="#f59e0b"/>
      <text x="14" y="0" fill="#f4f4f5" font-weight="700">NL → SQL</text>
      <text x="14" y="18" fill="#8a8278" font-size="12">GPT-4o-mini</text>
    </g>
    <g transform="translate(1040,150)">
      <circle cx="0" cy="-4" r="4" fill="#f59e0b"/>
      <text x="14" y="0" fill="#f4f4f5" font-weight="700">SELECT-only</text>
      <text x="14" y="18" fill="#8a8278" font-size="12">zero write risk</text>
    </g>
    <g transform="translate(1058,260)">
      <circle cx="0" cy="-4" r="4" fill="#f59e0b"/>
      <text x="14" y="0" fill="#f4f4f5" font-weight="700">Databricks SQL</text>
      <text x="14" y="18" fill="#8a8278" font-size="12">indexed warehouse</text>
    </g>
  </g>

  <!-- risk gradient bar -->
  <g transform="translate(440,330)">
    <rect x="0" y="0" width="400" height="8" rx="4" fill="url(#risk)"/>
    <text x="0" y="28" font-family="'SF Mono',ui-monospace,monospace" font-size="11" letter-spacing="2" fill="#7c8b73">SAFE</text>
    <text x="400" y="28" text-anchor="end" font-family="'SF Mono',ui-monospace,monospace" font-size="11" letter-spacing="2" fill="#b4584f">RISK</text>
    <text x="200" y="28" text-anchor="middle" font-family="'SF Mono',ui-monospace,monospace" font-size="11" letter-spacing="2" fill="#9a8f80">PRIORITY SCORE  0 – 100</text>
  </g>
</svg>
